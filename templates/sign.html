{% extends 'base.html' %}
{% block body %}

 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up & Login - JobPortal India</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7fc;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-card {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .auth-card h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #007bff;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .form-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .form-btn:hover {
            background-color: #0056b3;
        }

        .switch-auth {
            text-align: center;
            margin-top: 15px;
        }

        .switch-auth a {
            color: #007bff;
            text-decoration: none;
        }

        .switch-auth a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Sign Up Form -->
            <h3>Sign Up</h3>
            <form action="/submit-signup" method="POST">
                <div class="form-group">
                    <input type="text" class="form-control" id="signup-name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" class="form-control" id="signup-email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-control" id="signup-password" placeholder="Password" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-control" id="signup-confirm-password" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="form-btn">Sign Up</button>
            </form>
            <div class="switch-auth">
                Already have an account? <a href="#login-form">Login</a>
            </div>
        </div>
        
        <!-- Login Form (Initially Hidden) -->
        <div class="auth-card" id="login-form" style="display: none;">
            <h3>Login</h3>
            <form action="/submit-login" method="POST">
                <div class="form-group">
                    <input type="email" class="form-control" id="login-email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-control" id="login-password" placeholder="Password" required>
                </div>
                <button type="submit" class="form-btn">Login</button>
            </form>
            <div class="switch-auth">
                Don't have an account? <a href="#signup-form">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Popper -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

    <!-- Script to toggle between Sign Up and Login forms -->
    <script>
        // Toggle between Sign Up and Login forms
        const signupLink = document.querySelector('a[href="#login-form"]');
        const loginLink = document.querySelector('a[href="#signup-form"]');
        const signupForm = document.querySelector('.auth-card:first-of-type');
        const loginForm = document.querySelector('.auth-card:nth-of-type(2)');
        
        signupLink.addEventListener('click', function () {
            signupForm.style.display = 'none';
            loginForm.style.display = 'block';
        });

        loginLink.addEventListener('click', function () {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
        });
    </script>
</body>

</html> 






{% endblock body %}
